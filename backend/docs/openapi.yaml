openapi: 3.0.3
info:
  title: GamQuiz API
  description: School quiz platform API
  version: 1.0.0

servers:
  - url: /api/v1
    description: API v1

security:
  - sanctum: []

components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        username:
          type: string
          nullable: true
        display_name:
          type: string
          nullable: true
        class_name:
          type: string
          nullable: true
        auth_provider:
          type: string
          enum: [local, entra_id]
        is_active:
          type: boolean
        totp_enabled:
          type: boolean
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
        roles:
          type: array
          items:
            type: string
          example: [student]

    UserList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        meta:
          type: object
          properties:
            current_page:
              type: integer
            last_page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer

    ClassEntry:
      type: object
      properties:
        class_name:
          type: string
        student_count:
          type: integer

    UserStats:
      type: object
      properties:
        total_users:
          type: integer
        active_users:
          type: integer
        by_role:
          type: object
          additionalProperties:
            type: integer
        by_auth_provider:
          type: object
          additionalProperties:
            type: integer
        recent_signups_30d:
          type: integer

    BulkUserEntry:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
          nullable: true
        class_name:
          type: string
          nullable: true
        auth_provider:
          type: string
          enum: [local, entra_id]
          nullable: true
        role:
          type: string

    BulkResult:
      type: object
      properties:
        created:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: object
            properties:
              row:
                type: integer
              email:
                type: string
                nullable: true
              errors:
                type: array
                items:
                  type: string

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    Error:
      type: object
      properties:
        message:
          type: string

paths:
  /users:
    get:
      summary: List users
      description: Returns a paginated, filterable list of users. Accessible by teachers, admins and superadmins.
      tags: [Users]
      parameters:
        - name: role
          in: query
          schema:
            type: string
          description: Filter by role name (student, teacher, admin, superadmin)
        - name: class
          in: query
          schema:
            type: string
          description: Filter by exact class_name
        - name: class_prefix
          in: query
          schema:
            type: string
          description: Filter classes starting with this prefix (e.g. "3" matches 3a, 3b)
        - name: search
          in: query
          schema:
            type: string
          description: Case-insensitive search in email, username, display_name
        - name: is_active
          in: query
          schema:
            type: boolean
          description: Filter by active status
        - name: auth_provider
          in: query
          schema:
            type: string
            enum: [local, entra_id]
        - name: created_after
          in: query
          schema:
            type: string
            format: date
        - name: created_before
          in: query
          schema:
            type: string
            format: date
        - name: sort
          in: query
          schema:
            type: string
            enum: [email, created_at, display_name, class_name, last_login_at]
          description: "Sort field (default: created_at)"
        - name: direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
          description: "Sort direction (default: desc)"
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: "Items per page (default: 25)"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: with_trashed
          in: query
          schema:
            type: boolean
          description: Include soft-deleted users (admin/superadmin only)
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create a user
      description: Creates a new user and assigns a role. Admin and superadmin only.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, auth_provider, role]
              properties:
                email:
                  type: string
                  format: email
                username:
                  type: string
                  maxLength: 100
                  nullable: true
                display_name:
                  type: string
                  maxLength: 255
                  nullable: true
                password:
                  type: string
                  minLength: 8
                  description: Required when auth_provider is local. Must contain uppercase, lowercase and a number.
                auth_provider:
                  type: string
                  enum: [local, entra_id]
                class_name:
                  type: string
                  maxLength: 20
                  nullable: true
                role:
                  type: string
                  description: Must exist in roles table
                is_active:
                  type: boolean
                  default: true
            example:
              email: max.mustermann@schule.at
              username: max.mustermann
              display_name: Max Mustermann
              password: SecureP@ss123
              auth_provider: local
              class_name: 3b
              role: student
              is_active: true
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /users/classes:
    get:
      summary: List classes with student counts
      description: Returns distinct class names in use, with the number of students in each. Accessible by teachers, admins and superadmins.
      tags: [Users]
      responses:
        '200':
          description: Class list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClassEntry'
              example:
                data:
                  - class_name: 3a
                    student_count: 24
                  - class_name: 3b
                    student_count: 22
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden

  /users/stats:
    get:
      summary: User statistics
      description: Returns aggregated user counts. Admin and superadmin only.
      tags: [Users]
      responses:
        '200':
          description: Statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserStats'
              example:
                data:
                  total_users: 450
                  active_users: 430
                  by_role:
                    student: 400
                    teacher: 40
                    admin: 8
                    superadmin: 2
                  by_auth_provider:
                    entra_id: 420
                    local: 30
                  recent_signups_30d: 15
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden

  /users/bulk:
    post:
      summary: Bulk import users
      description: Imports multiple users at once. Skips existing emails and collects per-row errors. Admin and superadmin only.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [users]
              properties:
                users:
                  type: array
                  minItems: 1
                  items:
                    $ref: '#/components/schemas/BulkUserEntry'
                default_auth_provider:
                  type: string
                  enum: [local, entra_id]
                  default: local
                send_welcome_email:
                  type: boolean
                  default: false
            example:
              users:
                - email: a@schule.at
                  display_name: Alice A
                  class_name: 3b
                  role: student
                - email: b@schule.at
                  display_name: Bob B
                  class_name: 3b
                  role: student
              default_auth_provider: entra_id
              send_welcome_email: false
      responses:
        '200':
          description: Import summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkResult'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '422':
          description: Validation error (outer structure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get a user
      description: Returns full user details. Admins and superadmins can view any user; other users can only view their own profile.
      tags: [Users]
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '404':
          description: Not found

    put:
      summary: Update a user
      description: |
        Updates user fields.
        - Admins/superadmins can update all fields including role and class_name.
        - Users can only update their own display_name and username.
        - Setting is_active to false invalidates all active sessions.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                username:
                  type: string
                  maxLength: 100
                  nullable: true
                display_name:
                  type: string
                  maxLength: 255
                  nullable: true
                class_name:
                  type: string
                  maxLength: 20
                  nullable: true
                is_active:
                  type: boolean
                auth_provider:
                  type: string
                  enum: [local, entra_id]
                role:
                  type: string
                  description: Admin only — replaces all current roles with this one
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '404':
          description: Not found
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

    delete:
      summary: Soft-delete a user
      description: Soft-deletes a user. Superadmin only. Cannot delete yourself or the last superadmin.
      tags: [Users]
      responses:
        '204':
          description: Deleted (no content)
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '404':
          description: Not found
        '422':
          description: Cannot delete yourself or last superadmin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}/restore:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Restore a soft-deleted user
      description: Restores a previously soft-deleted user. Superadmin only.
      tags: [Users]
      responses:
        '200':
          description: Restored user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '404':
          description: Not found

  /users/{id}/password:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      summary: Change password
      description: |
        Changes the password for a local-auth user.
        - Users changing their own password must supply current_password.
        - Admins/superadmins resetting another user's password do not need current_password.
        - Invalidates all active Sanctum tokens after a successful change.
        - Only available for auth_provider = local.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_password]
              properties:
                current_password:
                  type: string
                  description: Required when changing own password
                new_password:
                  type: string
                  minLength: 8
                  description: Must contain uppercase, lowercase and a number
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '404':
          description: Not found
        '422':
          description: Wrong current password or non-local provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

tags:
  - name: Users
    description: User management endpoints
