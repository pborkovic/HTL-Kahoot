# -----------------------------
# Connection Settings
# -----------------------------
listen_addresses = '*'
port = 5432

# Maximum number of concurrent connections
max_connections = 200

# -----------------------------
# Memory Settings
# -----------------------------
shared_buffers = 256MB
work_mem = 16MB
maintenance_work_mem = 64MB

# -----------------------------
# Checkpoints and WAL (Write-Ahead Log)
# -----------------------------
# Development should focus on speed, so relax the durability guarantees a bit.
wal_level = minimal
synchronous_commit = off
fsync = off
full_page_writes = off
checkpoint_timeout = 10min
checkpoint_completion_target = 0.7

# -----------------------------
# Logging Settings
# -----------------------------
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql.log'
log_statement = 'all'
log_min_duration_statement = 0

# -----------------------------
# Autovacuum (for development, you can tune this aggressively)
# -----------------------------
autovacuum = on
autovacuum_naptime = 10s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.1

# -----------------------------
# Optimizer Settings
# -----------------------------
effective_cache_size = 512MB
default_statistics_target = 100

# -----------------------------
# Client Connection Defaults
# -----------------------------
# Character encoding and collation
client_encoding = 'UTF8'
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'

# -----------------------------
# Parallel Query Settings
# -----------------------------
# Enable parallel queries for better performance in development
max_parallel_workers_per_gather = 2
parallel_setup_cost = 1000
parallel_tuple_cost = 0.1

