services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: benji-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-htl_kahoot}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - benji_postgres_data:/var/lib/postgresql/data
      - ./backend/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./backend/postgres/initdb:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - benji-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: benji-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --loglevel debug
    volumes:
      - benji_redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - benji-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Backend (PHP-FPM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: benji-backend
    restart: unless-stopped
    working_dir: /var/www/backend
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=${APP_KEY:-}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-htl_kahoot}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./backend:/var/www/backend
      - benji_backend_vendor:/var/www/backend/vendor
      - benji_backend_storage:/var/www/backend/storage
    command: >
      sh -c "composer install --no-interaction &&
             php artisan config:cache &&
             php artisan migrate --force &&
             php-fpm"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - benji-network

  # Nginx Web Server (Backend/API only)
  nginx:
    image: nginx:alpine
    container_name: benji-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./backend/public:/var/www/backend/public:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/app.benji.conf:/etc/nginx/conf.d/default.conf:ro
      - benji_nginx_logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - benji-network

networks:
  benji-network:
    driver: bridge

volumes:
  benji_postgres_data:
    driver: local
  benji_redis_data:
    driver: local
  benji_backend_vendor:
    driver: local
  benji_backend_storage:
    driver: local
  benji_nginx_logs:
    driver: local
