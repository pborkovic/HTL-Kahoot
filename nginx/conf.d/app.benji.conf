upstream backend {
    server backend:9000;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API requests to Laravel backend
    location /api {
        root /var/www/backend/public;
        try_files $uri $uri/ @backend;
    }

    # Swagger UI spec and assets (l5-swagger serves these from /docs)
    location /docs {
        root /var/www/backend/public;
        try_files $uri $uri/ @backend;
    }

    location @backend {
        fastcgi_pass backend;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;

        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;
    }

    # Backend static files
    location ~ ^/(storage|css|js|images|fonts) {
        root /var/www/backend/public;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Default: return info that this is the API-only setup
    location / {
        root /var/www/backend/public;
        try_files $uri $uri/ @backend;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
